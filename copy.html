<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Copy — LP Ricardo Calheiros</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf7;
  --bg-alt:#f2efe7;
  --text:#1a1814;
  --text-muted:#6b6458;
  --accent:#a3651a;
  --accent-soft:#e8d9b8;
  --border:#e4ddd0;
  --code-bg:#f0ebe0;
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,sans-serif;
  font-size:16.5px;
  line-height:1.7;
  padding:0;
}
.wrap{
  max-width:760px;
  margin:0 auto;
  padding:3.5rem 1.8rem 6rem;
}
header.doc-head{
  padding-bottom:2rem;
  margin-bottom:2.5rem;
  border-bottom:1px solid var(--border);
}
header.doc-head .kicker{
  font-size:.72rem;
  font-weight:600;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:.7rem;
}
header.doc-head .title{
  font-family:'Lora',serif;
  font-size:2rem;
  font-weight:700;
  line-height:1.25;
  color:var(--text);
  margin-bottom:.4rem;
}
header.doc-head .meta{
  font-size:.85rem;
  color:var(--text-muted);
}
header.doc-head .meta a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)}
header.doc-head .meta a:hover{color:var(--text)}

#content{color:var(--text)}
#content h1{
  font-family:'Lora',serif;
  font-size:1.9rem;
  font-weight:700;
  line-height:1.25;
  margin:3rem 0 1.1rem;
  padding-bottom:.5rem;
  border-bottom:1px solid var(--border);
  color:var(--text);
}
#content h1:first-child{margin-top:0}
#content h2{
  font-family:'Lora',serif;
  font-size:1.45rem;
  font-weight:700;
  line-height:1.3;
  margin:2.8rem 0 .9rem;
  color:var(--text);
  padding-top:.4rem;
}
#content h2::before{
  content:'';
  display:block;
  width:2.6rem;
  height:3px;
  background:var(--accent);
  margin-bottom:.9rem;
  border-radius:2px;
}
#content h3{
  font-family:'Lora',serif;
  font-size:1.18rem;
  font-weight:700;
  margin:2rem 0 .6rem;
  color:var(--text);
}
#content h4{
  font-size:.95rem;
  font-weight:700;
  letter-spacing:.02em;
  margin:1.5rem 0 .5rem;
  color:var(--text);
}
#content p{
  margin:.85rem 0;
  color:var(--text);
}
#content strong{
  color:var(--text);
  font-weight:700;
}
#content em{
  font-family:'Lora',serif;
  font-style:italic;
  color:var(--accent);
  font-weight:600;
}
#content ul,#content ol{
  margin:1rem 0 1rem 1.5rem;
  padding-left:.6rem;
}
#content li{
  margin:.45rem 0;
  padding-left:.2rem;
  line-height:1.65;
}
#content li::marker{color:var(--accent)}
#content blockquote{
  margin:1.3rem 0;
  padding:1rem 1.4rem;
  border-left:3px solid var(--accent);
  background:var(--bg-alt);
  border-radius:0 4px 4px 0;
  font-family:'Lora',serif;
  font-style:italic;
  color:var(--text);
  font-size:1.02rem;
  line-height:1.6;
}
#content blockquote p{margin:.4rem 0}
#content hr{
  border:none;
  height:1px;
  background:var(--border);
  margin:3rem 0;
}
#content code{
  font-family:ui-monospace,"SF Mono",Menlo,monospace;
  font-size:.88rem;
  background:var(--code-bg);
  padding:.12rem .4rem;
  border-radius:3px;
  color:#7a4a12;
}
#content pre{
  background:var(--code-bg);
  padding:1rem 1.2rem;
  border-radius:6px;
  overflow-x:auto;
  font-size:.86rem;
  margin:1.2rem 0;
}
#content pre code{background:none;padding:0;color:inherit}
#content table{
  width:100%;
  border-collapse:collapse;
  margin:1.5rem 0;
  font-size:.93rem;
}
#content table th,#content table td{
  padding:.7rem .9rem;
  text-align:left;
  border-bottom:1px solid var(--border);
}
#content table th{
  background:var(--bg-alt);
  font-weight:700;
  color:var(--text);
}
#content table tr:last-child td{border-bottom:none}
#content a{color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-soft);transition:border-color .15s}
#content a:hover{border-color:var(--accent)}
#content input[type="checkbox"]{margin-right:.5rem;accent-color:var(--accent)}

footer.doc-foot{
  margin-top:4rem;
  padding-top:2rem;
  border-top:1px solid var(--border);
  font-size:.78rem;
  color:var(--text-muted);
  text-align:center;
}

.loader{
  padding:4rem 0;
  text-align:center;
  color:var(--text-muted);
  font-size:.9rem;
}
.error{
  padding:2rem;
  border:1px solid #d4a0a0;
  background:#fbeeee;
  border-radius:6px;
  color:#8a3030;
}

@media(max-width:620px){
  .wrap{padding:2.2rem 1.2rem 4rem}
  header.doc-head .title{font-size:1.55rem}
  #content h1{font-size:1.55rem}
  #content h2{font-size:1.25rem}
  #content h3{font-size:1.08rem}
  body{font-size:15.5px}
}
</style>
</head>
<body>

<div class="wrap">

<header class="doc-head">
  <div class="kicker">Documento de leitura</div>
  <h1 class="title">Copy — Landing Page Ricardo Calheiros</h1>
  <div class="meta">
    Certificação em Coaching e Treino Canino · PT-PT ·
    <a href="index.html">ver LP de referência visual →</a>
  </div>
</header>

<article id="content">
  <div class="loader">A carregar copy…</div>
</article>

<footer class="doc-foot">
  Fonte: <code>v2-copy-final.md</code> · Gerado automaticamente pelo time Elton Miranda
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
(async()=>{
  const el=document.getElementById('content');
  try{
    const r=await fetch('copy.md?v='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const md=await r.text();
    marked.setOptions({gfm:true,breaks:false});
    el.innerHTML=marked.parse(md);
  }catch(e){
    el.innerHTML='<div class="error"><strong>Erro ao carregar copy.md:</strong> '+e.message+'</div>';
  }
})();
</script>

</body>
</html>
